<div class="all-content">
  <div class="left-content">
    <div class="img-content">
      <img src="../../../../../assets/images/auth-hero.png" alt="Subscription dashboard preview" decoding="async">
      <app-auth-hero-caption />
    </div>
  </div>
  @if (isLoading) {
    <div class="loading-signin">
      <app-loading />
    </div>
  }
  @if (!isLoading) {
    <div class="right-content">
      <div class="form-wrapper">
        <div class="title-login">
          <p class="auth-eyebrow">Welcome back</p>
          <h1 class="auth-title-gradient">Manage your stack</h1>
          <p class="auth-lead">Sign in to track your recurring expenses and control your personal subscriptions.</p>
        </div>
        <div class="signup-rail" aria-label="Create a new account">
          <div class="signup-rail-accent" aria-hidden="true"></div>
          <div class="signup-rail-copy">
            <span class="signup-rail-kicker">First time here?</span>
            <span class="signup-rail-line">Start managing your subscriptions in minutes.</span>
          </div>
          <button type="button" class="signup-rail-action" (click)="navigateTo('register')">
            Create account
            <i class="pi pi-arrow-up-right" aria-hidden="true"></i>
          </button>
        </div>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="container-login">
          <div class="field">
            <label for="email">Email</label>
            <input pInputText id="email" formControlName="email" type="email" autocomplete="email" placeholder="you@company.com" [ngClass]="{'input-invalid': isInvalid}" />
          </div>
          <div class="field">
            <div class="label-row">
              <label for="password">Password</label>
              <a class="forgot-link" (click)="navigateTo('forget-password')">Forgot?</a>
            </div>
            <div class="password-wrapper">
              <input pInputText id="password" formControlName="password" [type]="visiblePassword ? 'text' : 'password'" autocomplete="current-password" placeholder="••••••••" [ngClass]="{'input-invalid': isInvalid}" />
              <button type="button" class="eye-btn" (click)="togglePassword()">
                <i [class]="visiblePassword ? 'pi pi-eye-slash' : 'pi pi-eye'"></i>
              </button>
            </div>
          </div>
          <button pButton pRipple type="submit" class="submit-btn glow-btn">
            <span>Sign in</span>
          </button>
        </form>
        <div class="divider">
          <span>or</span>
        </div>
        <div class="social-login">
          <button type="button" class="social-btn google-btn" (click)="signinWithGoogle()">
            <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A11.96 11.96 0 0 0 0 12c0 1.94.46 3.77 1.28 5.4l3.56-2.77.01-.54z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            <span>Google</span>
          </button>
        </div>

      </div>
    </div>
  }
</div>
<div class="auth-theme-fab">
  <app-button-theme [compact]="true" />
</div>
